<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionTag | Elite YOLO Annotator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="dark-theme">
    <div id="app">
        <!-- Header / Toolbar -->
        <header class="app-header">
            <div class="logo">
                <img src="/logo-horizontal.png" alt="VisionTag" class="logo-img">
            </div>
            <div class="toolbar-center">
                <vt-button id="btn-select" class="tool-btn active" title="Select (V)" icon='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z" /><path d="m13 13 6 6" /></svg>'></vt-button>
                <vt-button id="btn-draw" class="tool-btn" title="Draw Box (W)" icon='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M3 9h18" /><path d="M9 3v18" /></svg>'></vt-button>
                <div class="divider"></div>
                <vt-button id="btn-prev" class="tool-btn" title="Previous (A)" icon='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6" /></svg>'></vt-button>
                <span id="image-counter">0 / 0</span>
                <vt-button id="btn-next" class="tool-btn" title="Next (D)" icon='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6" /></svg>'></vt-button>
            </div>
            <div class="toolbar-right">
                <vt-button id="btn-open" variant="secondary" icon='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z" /></svg>'>Open Folder</vt-button>
                <vt-button id="btn-export" variant="primary" icon='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" x2="12" y1="15" y2="3" /></svg>'>Export YOLO</vt-button>
            </div>
        </header>

        <main class="app-content">
            <!-- Left Sidebar: Explorer -->
            <aside class="sidebar-left">
                <vt-sidebar-section title="Explorer">
                    <vt-badge id="file-count" slot="action">0 items</vt-badge>
                    <div id="image-list" class="image-list">
                        <div class="empty-state">No folder loaded</div>
                    </div>
                </vt-sidebar-section>
            </aside>

            <!-- Center: Canvas Workspace -->
            <section id="workspace" class="workspace">
                <canvas id="main-canvas"></canvas>
                
                <!-- Overlays -->
                <div id="loading-overlay" class="overlay hidden">
                    <div class="spinner"></div>
                    <p>Loading dataset...</p>
                </div>
                
                <!-- Crosshair Guide -->
                <div id="crosshair-v" class="crosshair hidden"></div>
                <div id="crosshair-h" class="crosshair hidden"></div>
            </section>

            <!-- Right Sidebar: Classes & Inspector -->
            <aside class="sidebar-right">
                <vt-sidebar-section title="Classes">
                    <vt-button id="btn-add-class" slot="action" variant="secondary" size="sm" icon='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>'></vt-button>
                    <div id="class-list" class="class-list">
                        <!-- Classes will be injected here -->
                    </div>
                </vt-sidebar-section>

                <vt-sidebar-section title="AI Assistant" class="ai-section">
                    <vt-badge id="model-status-badge" slot="action" variant="warning">Idle</vt-badge>
                    <div class="ai-controls">
                        <vt-button id="btn-load-model" variant="outline" class="btn-full" icon='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>'>Load Custom Model</vt-button>
                        <vt-button id="btn-auto-label-all" variant="primary" class="btn-full" disabled title="Load a model first" icon='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4-4-4"/><path d="M3 3.41V21h11.81"/><path d="m13 15 4-4-4-4"/><path d="M3 13h14"/></svg>'>Auto-Label Dataset</vt-button>
                        <p id="ai-model-name" class="ai-info">Using Default: YOLOv8n</p>
                    </div>
                </vt-sidebar-section>

                <vt-sidebar-section title="Annotations">
                    <vt-badge id="box-count" slot="action">0</vt-badge>
                    <div id="annotation-list" class="annotation-list">
                        <div class="empty-state-small">No annotations yet</div>
                    </div>
                </vt-sidebar-section>

                <vt-sidebar-section title="Hotkeys" class="hotkeys-tip">
                    <ul class="hotkey-list">
                        <li><span>Draw Mode</span> <kbd>W</kbd></li>
                        <li><span>Select Mode</span> <kbd>V</kbd></li>
                        <li><span>Next Image</span> <kbd>D</kbd></li>
                        <li><span>Prev Image</span> <kbd>A</kbd></li>
                        <li><span>Delete Box</span> <kbd>Del</kbd></li>
                        <li><span>Pan View</span> <kbd>Space</kbd></li>
                    </ul>
                </vt-sidebar-section>
            </aside>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <div id="status-message">Ready</div>
            <div class="footer-stats">
                <span id="coord-display">X: 0, Y: 0</span>
                <span id="zoom-display">100%</span>
            </div>
        </footer>
        
        <!-- Custom Modal System -->
        <vt-modal id="app-modal"></vt-modal>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
    <script type="module" src="./js/main.js"></script>
</body>

</html>
