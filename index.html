<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTensor | Elite YOLO Annotator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="/st-favicon.png">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="dark-theme font-(--font-main) bg-(--bg-main) text-(--text-primary) overflow-hidden h-screen">
    <div id="app" class="flex flex-col h-screen">
        <!-- Header / Toolbar -->
        <header
            class="h-(--header-height) bg-(--bg-header) border-b border-(--glass-border) flex items-center justify-between z-100 py-1 pl-3 pr-4">
            <div class="flex items-center gap-[10px] h-full">
                <a href="/" style="display: block; height: 100%;">
                    <img src="/st-logo-horizontal.png" alt="SharpTensor" class="h-full w-auto block object-contain">
                </a>
            </div>

            <div class="flex items-center gap-2 bg-(--bg-card) p-1 rounded-[10px] border border-(--border)">
                <st-tool-button id="btn-select" title="Select (V)" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z" />
                        <path d="m13 13 6 6" />
                    </svg>
                </st-tool-button>
                <st-tool-button id="btn-draw" title="Draw Box (W)" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M3 9h18" />
                        <path d="M9 3v18" />
                    </svg>
                </st-tool-button>
                <div class="w-px h-5 bg-(--border) mx-1"></div>
                <st-tool-button id="btn-prev" title="Previous (A)" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </st-tool-button>
                <span id="image-counter" class="text-(--text-muted) text-[0.75rem] font-mono px-1">0 / 0</span>
                <st-tool-button id="btn-next" title="Next (D)" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m9 18 6-6-6-6" />
                    </svg>
                </st-tool-button>
            </div>
            <div class="flex items-center gap-3">
                <a href="https://github.com/andhiyaulhaq/SharpTensor" target="_blank" rel="noopener noreferrer"
                    style="text-decoration: none;">
                    <button id="btn-github"
                        class="inline-flex items-center justify-center gap-2 px-[18px] py-[10px] rounded-[8px] font-semibold text-[0.875rem] cursor-pointer transition-all duration-200 ease-in-out border border-(--border) leading-none whitespace-nowrap select-none active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:grayscale disabled:pointer-events-none bg-(--bg-card) text-(--text-primary) hover:bg-(--bg-hover) hover:border-(--text-muted) hover:text-white"
                        title="View GitHub Repository">
                        <span class="flex items-center justify-center shrink-0"><svg width="18" height="18"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
                                <path d="M9 18c-4.51 2-5-2-7-2" />
                            </svg></span>
                    </button>
                </a>

                <button id="btn-open"
                    class="inline-flex items-center justify-center gap-2 px-[18px] py-[10px] rounded-[8px] font-semibold text-[0.875rem] cursor-pointer transition-all duration-200 ease-in-out border border-(--border) leading-none whitespace-nowrap select-none active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:grayscale disabled:pointer-events-none bg-(--bg-card) text-(--text-primary) hover:bg-(--bg-hover) hover:border-(--text-muted) hover:text-white">
                    <span class="flex items-center justify-center shrink-0"><svg width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z" />
                        </svg></span>
                    <span class="flex items-center justify-center text-center">Open Folder</span>
                </button>
                <button id="btn-export"
                    class="inline-flex items-center justify-center gap-2 px-[18px] py-[10px] rounded-[8px] font-semibold text-[0.875rem] cursor-pointer transition-all duration-200 ease-in-out border border-transparent leading-none whitespace-nowrap select-none active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:grayscale disabled:pointer-events-none bg-(--accent) text-(--accent-text) shadow-[0_4px_12px_var(--accent-glow)] hover:bg-(--accent-light) hover:-translate-y-px hover:shadow-[0_6px_16px_var(--accent-glow)]"
                    disabled>
                    <span class="flex items-center justify-center shrink-0"><svg width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" x2="12" y1="15" y2="3" />
                        </svg></span>
                    <span class="flex items-center justify-center text-center">Export YOLO</span>
                </button>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden">
            <aside class="w-(--sidebar-left-width) bg-(--bg-sidebar) border-r border-(--border) flex flex-col px-4">
                <st-sidebar-section title="Explorer" badge-id="file-count" badge-text="0 items">
                    <div id="image-list" class="flex flex-col gap-1 py-2">
                        <div class="text-(--text-muted) text-[0.85rem] italic py-4 text-center">No folder loaded</div>
                    </div>
                </st-sidebar-section>
            </aside>

            <!-- Center: Canvas Workspace -->
            <section id="workspace"
                class="flex-1 bg-[#0a0b0e] relative overflow-hidden flex items-center justify-center cursor-crosshair">
                <canvas id="main-canvas" class="max-w-full max-h-full"></canvas>

                <!-- Overlays -->
                <div id="loading-overlay" class="absolute inset-0 z-50 hidden">
                    <div class="w-full h-full bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center">
                        <div
                            class="w-8 h-8 border-4 border-(--accent)/30 border-t-(--accent) rounded-full animate-spin mb-4">
                        </div>
                        <p class="text-white font-medium">Loading dataset...</p>
                    </div>
                </div>

                <!-- Crosshair Guide -->
                <div id="crosshair-v"
                    class="absolute top-0 bottom-0 w-px bg-(--accent) opacity-50 pointer-events-none z-10 hidden"></div>
                <div id="crosshair-h"
                    class="absolute left-0 right-0 h-px bg-(--accent) opacity-50 pointer-events-none z-10 hidden"></div>
            </section>

            <!-- Right Sidebar: Classes & Inspector -->
            <aside
                class="w-(--sidebar-right-width) bg-(--bg-sidebar) border-l border-(--border) flex flex-col px-4 overflow-y-auto">
                <st-sidebar-section title="Classes">
                    <div class="flex flex-col gap-1 py-1" id="class-list"></div>
                    <button id="btn-add-class"
                        class="mt-2 w-full flex items-center justify-center py-1.5 rounded-md bg-(--bg-card) border border-(--border) text-(--text-secondary) hover:text-(--text-primary) hover:bg-(--bg-hover) transition-all disabled:opacity-50"
                        disabled>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span class="ml-2 text-[0.75rem] font-semibold">New Class</span>
                    </button>
                </st-sidebar-section>

                <st-sidebar-section title="AI Assistant" badge-id="model-status-badge" badge-text="Idle">
                    <div class="flex flex-col gap-2">
                        <button id="btn-load-model"
                            class="w-full flex items-center justify-center gap-2 py-2 px-4 rounded-lg bg-(--bg-card) border border-(--border) text-(--text-primary) text-[0.85rem] font-semibold hover:bg-(--bg-hover) transition-all disabled:opacity-50"
                            disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="7 10 12 15 17 10" />
                                <line x1="12" x2="12" y1="15" y2="3" />
                            </svg>
                            <span>Load Custom Model</span>
                        </button>
                        <button id="btn-auto-label-all"
                            class="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg bg-(--accent) text-(--accent-text) text-[0.85rem] font-bold hover:bg-(--accent-light) transition-all shadow-[0_4px_12px_var(--accent-glow)] disabled:opacity-50"
                            disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m12 14 4-4-4-4" />
                                <path d="M3 3.41V21h11.81" />
                                <path d="m13 15 4-4-4-4" />
                                <path d="M3 13h14" />
                            </svg>
                            <span>Auto-Label Dataset</span>
                        </button>
                        <p id="ai-model-name" class="text-[0.7rem] text-(--text-muted) mt-1 text-center italic">Using
                            Default: YOLOv8n</p>
                    </div>
                </st-sidebar-section>

                <st-sidebar-section title="Annotations" badge-id="box-count" badge-text="0">
                    <div id="annotation-list" class="flex flex-col gap-1">
                        <div class="text-(--text-muted) text-[0.8rem] italic py-2 text-center">No annotations yet</div>
                    </div>
                </st-sidebar-section>

                <div class="py-4 border-b border-(--border) flex flex-col bg-(--bg-card)/30 -mx-4 px-4 my-2">
                    <h3 class="text-[0.85rem] font-bold uppercase tracking-wider text-(--text-muted) mb-3">Hotkeys</h3>
                    <ul class="flex flex-col gap-2.5">
                        <li class="flex justify-between items-center text-[0.8rem] text-(--text-secondary)"><span>Draw
                                Mode</span> <kbd
                                class="bg-(--bg-card) px-1.5 py-0.5 rounded border border-(--border) text-(--text-primary) font-mono">W</kbd>
                        </li>
                        <li class="flex justify-between items-center text-[0.8rem] text-(--text-secondary)"><span>Select
                                Mode</span> <kbd
                                class="bg-(--bg-card) px-1.5 py-0.5 rounded border border-(--border) text-(--text-primary) font-mono">V</kbd>
                        </li>
                        <li class="flex justify-between items-center text-[0.8rem] text-(--text-secondary)"><span>Next
                                Image</span> <kbd
                                class="bg-(--bg-card) px-1.5 py-0.5 rounded border border-(--border) text-(--text-primary) font-mono">D</kbd>
                        </li>
                        <li class="flex justify-between items-center text-[0.8rem] text-(--text-secondary)"><span>Prev
                                Image</span> <kbd
                                class="bg-(--bg-card) px-1.5 py-0.5 rounded border border-(--border) text-(--text-primary) font-mono">A</kbd>
                        </li>
                        <li class="flex justify-between items-center text-[0.8rem] text-(--text-secondary)"><span>Delete
                                Box</span> <kbd
                                class="bg-(--bg-card) px-1.5 py-0.5 rounded border border-(--border) text-(--text-primary) font-mono text-[0.7rem]">Del</kbd>
                        </li>
                        <li class="flex justify-between items-center text-[0.8rem] text-(--text-secondary)"><span>Pan
                                View</span> <kbd
                                class="bg-(--bg-card) px-1.5 py-0.5 rounded border border-(--border) text-(--text-primary) font-mono text-[0.7rem]">Space</kbd>
                        </li>
                        <li class="flex justify-between items-center text-[0.8rem] text-(--text-secondary)">
                            <span>Zoom In / Out</span>
                            <div class="flex items-center gap-1"><kbd
                                    class="bg-(--bg-card) px-1.5 py-0.5 rounded border border-(--border) text-(--text-primary) font-mono text-[0.7rem]">Ctrl</kbd><span>+</span><kbd
                                    class="bg-(--bg-card) px-1.5 py-0.5 rounded border border-(--border) text-(--text-primary) font-mono text-[0.7rem]">Scroll</kbd>
                            </div>
                        </li>
                    </ul>
                </div>

                <div class="py-6 mt-auto">
                    <button id="btn-clear-all"
                        class="w-full flex items-center justify-center gap-2 py-2 px-4 rounded-lg bg-red-500/10 border border-red-500/20 text-red-500 text-[0.85rem] font-semibold hover:bg-red-500/20 transition-all disabled:opacity-50"
                        disabled>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2">
                            </path>
                        </svg>
                        <span>Clear All Annotations</span>
                    </button>
                </div>
            </aside>
        </main>

        <!-- Footer -->
        <footer
            class="h-(--footer-height) bg-(--bg-header) border-t border-(--border) flex items-center justify-between px-3 text-[0.75rem] text-(--text-muted)">
            <div id="status-message">Ready</div>
            <div class="flex gap-4">
                <span id="coord-display">X: 0, Y: 0</span>
                <span id="zoom-display">100%</span>
            </div>
        </footer>

        <st-modal id="app-modal" title="System Alert" class="hidden"></st-modal>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
    <script type="module" src="./js/main.js"></script>
</body>

</html>
